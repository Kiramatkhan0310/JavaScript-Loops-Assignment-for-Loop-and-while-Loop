<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        // JAVASCRIPT LOOPS ASSIGNMENT: FOR LOOP AND WHILE LOOP

        // for Loop Tasks
        // Print numbers from 1 to 10 using a for loop
        // Print all even numbers from 1 to 20
        // Write a program to display the multiplication table of 5
        // Calculate the sum of numbers from 1 to 50
        // Print numbers in reverse order (10 to 1)
        console.log("JAVASCRIPT LOOPS ASSIGNMENT: FOR LOOP AND WHILE LOOP")
        console.log("====================================================")

        // FOR LOOP TASKS
        console.log("FOR LOOP TASKS")
        console.log("==============")

        // Print numbers from 1 to 10 using a for loop
        console.log("TASK 1: Print numbers from 1 to 10 using a for loop")
        for (let i = 1; i <= 10; i++){
            console.log(i)
        }
        console.log("---------------------------------------------")

        // Print all even numbers from 1 to 20
        console.log("TASK 2: Print all even numbers from 1 to 20")
        for (let i = 1; i <= 20; i++){
            if (i % 2 == 0){
                console.log(i)
            }
        }
        console.log("---------------------------------------------")

        // Write a program to display the multiplication table of 5
        console.log("TASK 3: Write a program to display the multiplication table of 5")
        for (let i = 1; i <= 10; i++){
            let num = 5
            console.log(num + " X " + i + " = " + num * i)
        }
        console.log("---------------------------------------------")

        // Calculate the sum of numbers from 1 to 50
        console.log("TASK 4: Calculate the sum of numbers from 1 to 50")
        let sum = 0
        for (let i = 1; i <= 50; i++){
            sum = sum + i
        }
        console.log("Sum of numbers from 1 to 50 is: " + sum)
        console.log("---------------------------------------------")

        
        // Print numbers in reverse order (10 to 1)
        console.log("TASK 5: Print numbers in reverse order (10 to 1)")
        for (let i = 10; i >= 1; i--){
            console.log(i)
        }
        console.log("---------------------------------------------")
        // =========================================================================



        // while Loop Tasks
        // Print numbers from 1 to 10 using a while loop
        // Print all odd numbers from 1 to 20
        // Calculate the sum of numbers from 1 to 100
        // Print numbers in reverse order (10 to 1)
        // Create a password checker that keeps asking the user until they enter the correct password (admin123)

        // WHILE LOOP TASKS
        console.log("WHILE LOOP TASKS")
        console.log("================")

        // Print numbers from 1 to 10 using a while loop
        console.log("TASK 1: Print numbers from 1 to 10 using a while loop")
        let num = 1
        while(num <= 10){
            console.log(num)
            num++ 
        }
        console.log("---------------------------------------------")

        // Print all odd numbers from 1 to 20
        console.log("TASK 2: Print all odd numbers from 1 to 20")
        let numodd = 1
        while(numodd <= 20){
            if (numodd % 2 != 0){
                console.log(numodd)
            }
            numodd++
        }
        console.log("---------------------------------------------")

        // Calculate the sum of numbers from 1 to 100
        console.log("TASK 3: Calculate the sum of numbers from 1 to 100")
        let i = 1
        let sum3 = 0
        while(i <= 100){
            sum3 = sum3 + i
            i++
        }
        console.log(sum3)
        console.log("---------------------------------------------")

        // Print numbers in reverse order (10 to 1)
        console.log("TASK 4: Print numbers in reverse order (10 to 1)")
        let reversi = 10
        while(reversi >= 1){
            console.log(reversi)
            reversi--
        }
        console.log("---------------------------------------------")

        // Create a password checker that keeps asking the user until they enter the correct password (admin123)
        console.log("TASK 5: Create a password checker that keeps asking the user until they enter the correct password (admin123)")
        let correctpassword = "@admin123"
        let password = prompt("Enter your correct password")
        while(password != correctpassword){
            password = prompt("Enter your correct password")
        }
        console.log("Correct passowrd is: " + correctpassword)
        console.log("---------------------------------------------")
    </script>
</body>
</html>
